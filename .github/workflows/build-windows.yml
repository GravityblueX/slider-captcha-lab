name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install matplotlib pyinstaller
      - name: Build EXE
        run: pyinstaller --onefile --windowed --name SliderTrajectoryLab slider_lab.py
      - name: Copy demo files
        run: xcopy /E /I /Y demo dist\demo
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SliderTrajectoryLab-windows
          path: |
            dist/SliderTrajectoryLab.exe
            dist/demo/**
