name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium
      - name: Smoke check
        run: python scripts\smoke_check.py
      - name: Build LiuHen EXE
        run: |
          pyinstaller --clean --onefile --windowed --name LiuHen `
            --hidden-import slider_lab `
            --hidden-import authorized_gui_tester `
            --hidden-import risk_gui `
            --hidden-import behavior_gui `
            --hidden-import report_center `
            --hidden-import src.trajectory `
            --hidden-import src.analyzer `
            --hidden-import src.human_behavior `
            --hidden-import src.risk_analyzer `
            --hidden-import src.network_diagnostics `
            --hidden-import playwright.sync_api `
            liuhen.py
      - name: Copy runtime files
        run: |
          xcopy /E /I /Y demo dist\demo
          xcopy /E /I /Y src dist\src
          copy slider_lab.py dist\slider_lab.py
          copy authorized_gui_tester.py dist\authorized_gui_tester.py
          copy risk_gui.py dist\risk_gui.py
          copy behavior_gui.py dist\behavior_gui.py
          copy report_center.py dist\report_center.py
          copy DISCLAIMER.md dist\DISCLAIMER.md
      - name: Check packaged launcher
        run: dist\LiuHen.exe --smoke-check
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiuHen-windows
          path: dist/**
